name: java build with maven

on: 
  push:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions: 
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: maven
    - name: Build Application
      run: mvn -B package --file pom.xml
    - name: Build image
      run: docker build -t bigman004/java-application:latest .
    - name: login
      run:  docker login -u bigman004 -p ${{secrets.DOCKER_SECRET}}
    - name: push image
      run:  docker push bigman004/java-application:latest
   
      
